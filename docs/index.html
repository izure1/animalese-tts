<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <title>Animalese Streaming Client (Static)</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #222;
      color: #eee;
      padding: 2rem;
    }

    .layout-wrapper {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      gap: 20px;
      flex-wrap: wrap;
      max-width: 1200px;
      margin: 0 auto;
    }

    .container {
      flex: 1;
      min-width: 320px;
      background: #333;
      padding: 2rem;
      border-radius: 8px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
      box-sizing: border-box;
    }

    h1 {
      color: #88c0d0;
      margin-top: 0;
    }

    label {
      font-size: 0.9rem;
      display: block;
    }

    input,
    select,
    textarea {
      width: 100%;
      padding: 0.5rem;
      margin-bottom: 1rem;
      border: none;
      border-radius: 4px;
      background: #444;
      color: white;
      box-sizing: border-box;
      font-family: inherit;
    }

    textarea {
      resize: vertical;
    }

    button {
      width: 100%;
      background: #a3be8c;
      color: #222;
      border: none;
      padding: 1rem;
      font-size: 1.1rem;
      font-weight: bold;
      cursor: pointer;
      border-radius: 4px;
      transition: 0.2s;
    }

    button:hover {
      background: #8fbcbb;
    }

    #log {
      margin-top: 1rem;
      padding: 1rem;
      background: #111;
      font-family: monospace;
      border-radius: 4px;
      height: 100px;
      overflow-y: auto;
      color: #a3be8c;
    }
  </style>
  <script type="module" defer>
    import {
      AnimaleseEngine,
      KoreanAnalyzer,
      EnglishAnalyzer,
      JapaneseAnalyzer,
      WebSampler,
      MemorySampler,
      PitchManager,
      WebPlayer
    } from './animalese.browser.mjs';

    const playBtn = document.getElementById('playBtn');
    const logEl = document.getElementById('log');

    let baseUrl = './sounds';

    let sampleRate = 44100;
    const player = new WebPlayer(sampleRate);

    // WebSampleProvider preload using a known list or let it block dynamically
    // For this demo, WebSampleProvider will fetch dynamically on-the-fly.

    function log(msg) {
      logEl.innerHTML += `<div>${msg}</div>`;
      logEl.scrollTop = logEl.scrollHeight;
    }

    const langSelect = document.getElementById('lang');
    const textInput = document.getElementById('text');

    const defaultTexts = {
      ko: '꺄아~! 완전 대박! 나 방금 새로운 댄스 스텝을 연습 중이었어! 나중에 내가 우주 대스타가 되면 지금 이 사인, 엄청 귀해질걸? 미리미리 받아두는 게 좋을 거야, 반짝!',
      en: 'Wow! Totally awesome! I was just practicing a new dance step! When I become a huge universe star later, this signature right now will be super precious, you know? It\'ll be good to get it in advance, sparkle!',
      ja: 'キャー！ちょうヤバい！わたし、さっきあたらしいダンスステップをれんしゅうしてたの！あとでわたしがうちゅうのだいスターになったら、いまのこのサイン、めっちゃきちょうになるかもよ？はやめにもらっておいたほうがいいよ、キラッ！'
    };

    const i18n = {
      ko: {
        title: '🗣️ Animalese TTS',
        textLabel: '텍스트 문장',
        settingsSummary: '⚙️ 추가 설정',
        langLabel: '언어',
        pitchLabel: 'Pitch 배율 (기본 1.5배)',
        speedLabel: 'Speed 배율 (기본 4.0배)',
        randomnessLabel: 'Randomness (피치 변동폭, 기본 0.1)',
        melodyRateLabel: 'Melody Rate (음률 속도, 기본 0.05)',
        melodyAmplitudeLabel: 'Melody Amplitude (음률 진폭, 기본 0.1)',
        spaceDelayLabel: '띄어쓰기 대기 시간 (초, 기본 0.03)',
        punctuationDelayLabel: '마침표/특수기호 대기 시간 (초, 기본 0.3)',
        maxRetriesLabel: '없는 음소 재시도 제한 횟수 (기본 3번)',
        punctuationsLabel: '대기할 특수기호 목록 (문자열 나열, 기본: .,!?"~。、！？)',
        volumeLabel: '볼륨 (기본 1.0)',
        playBtnLabel: '▶️ 브라우저에서 직접 합성 및 재생',
        logInfo: '안내: 버튼을 누르면 클라이언트 단에서 합성을 진행하고 재생합니다.'
      },
      en: {
        title: '🗣️ Animalese TTS',
        textLabel: 'Text Sentence',
        settingsSummary: '⚙️ Additional Settings',
        langLabel: 'Language',
        pitchLabel: 'Pitch Multiplier (Default 1.5x)',
        speedLabel: 'Speed Multiplier (Default 4.0x)',
        randomnessLabel: 'Randomness (Pitch variance, Default 0.1)',
        melodyRateLabel: 'Melody Rate (Default 0.05)',
        melodyAmplitudeLabel: 'Melody Amplitude (Default 0.1)',
        spaceDelayLabel: 'Space Delay (Seconds, Default 0.03)',
        punctuationDelayLabel: 'Punctuation Delay (Seconds, Default 0.3)',
        maxRetriesLabel: 'Missing Phoneme Retry Limit (Default 3)',
        punctuationsLabel: 'Punctuations to wait for (Chars, Default: .,!?"~。、！？)',
        volumeLabel: 'Volume (Default 1.0)',
        playBtnLabel: '▶️ Synthesize and Play Directly in Browser',
        logInfo: 'Info: Click the button to synthesize and play audio on the client side.'
      },
      ja: {
        title: '🗣️ Animalese TTS',
        textLabel: 'テキスト文章',
        settingsSummary: '⚙️ 追加設定',
        langLabel: '言語',
        pitchLabel: 'ピッチ倍率（デフォルト1.5倍）',
        speedLabel: 'スピード倍率（デフォルト4.0倍）',
        randomnessLabel: 'ランダムネス（ピッチ変動幅、デフォルト0.1）',
        melodyRateLabel: 'メロディーレート（音律速度、デフォルト0.05）',
        melodyAmplitudeLabel: 'メロディー振幅（デフォルト0.1）',
        spaceDelayLabel: 'スペース待機時間（秒、デフォルト0.03）',
        punctuationDelayLabel: '句読点/記号待機時間（秒、デフォルト0.3）',
        maxRetriesLabel: '見つからない音素の再試行制限（デフォルト3回）',
        punctuationsLabel: '待機する記号のリスト（文字列、デフォルト: .,!?"~。、！？）',
        volumeLabel: '音量（デフォルト1.0）',
        playBtnLabel: '▶️ ブラウザで直接合成と再生',
        logInfo: '案内: ボタンを押すとクライアント側で合成を実行して再生します。'
      }
    };

    function updateLanguageUI(lang) {
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (i18n[lang] && i18n[lang][key]) {
          el.innerText = i18n[lang][key];
        }
      });
      textInput.value = defaultTexts[lang] || defaultTexts.ko;
    }

    langSelect.addEventListener('change', (e) => {
      updateLanguageUI(e.target.value);
    });

    playBtn.addEventListener('click', async () => {
      const text = document.getElementById('text').value;
      const pitch = parseFloat(document.getElementById('pitch').value);
      const speed = parseFloat(document.getElementById('speed').value);
      const lang = document.getElementById('lang').value;
      const randomness = parseFloat(document.getElementById('randomness').value);
      const melodyRate = parseFloat(document.getElementById('melodyRate').value);
      const melodyAmplitude = parseFloat(document.getElementById('melodyAmplitude').value);
      const spaceDelay = parseFloat(document.getElementById('spaceDelay').value);
      const punctuationDelay = parseFloat(document.getElementById('punctuationDelay').value);
      const maxRetries = parseInt(document.getElementById('maxRetries').value, 10);
      const volume = parseFloat(document.getElementById('volume').value)
      player.volume = volume

      const punctuationsStr = document.getElementById('punctuations').value;
      const punctuations = punctuationsStr ? punctuationsStr.split('') : undefined;

      log(`[Client] 생성 시작 '${text}'`);
      playBtn.disabled = true;

      let analyzer;
      let spriteWav;
      let spriteJsonUrl;

      if (lang === 'en') {
        analyzer = new EnglishAnalyzer();
        spriteWav = './sounds/english-sprite.wav';
        spriteJsonUrl = './sounds/english-sprite.json';
      } else if (lang === 'ja') {
        analyzer = new JapaneseAnalyzer();
        spriteWav = './sounds/japanese-sprite.wav';
        spriteJsonUrl = './sounds/japanese-sprite.json';
      } else {
        analyzer = new KoreanAnalyzer();
        spriteWav = './sounds/korean-sprite.wav';
        spriteJsonUrl = './sounds/korean-sprite.json';
      }

      log(`[Client] 스프라이트 데이터 로드 대기 중...`);
      const spriteMap = await fetch(spriteJsonUrl).then(r => r.json());

      const config = {
        analyzer,
        // WebSampler를 사용하는 기본 예제
        sampler: new WebSampler(spriteWav, spriteMap, { maxRetries }),
        
        // MemorySampler를 사용하는 경우의 예제:
        // const arrayBuffer = await fetch(spriteWav).then(r => r.arrayBuffer());
        // sampler: new MemorySampler(arrayBuffer, spriteMap, { maxRetries }),
        
        effect: new PitchManager({ pitch, speed, randomness, melodyRate, melodyAmplitude }),
        spaceDelay,
        punctuationDelay,
        punctuations,
      };

      const engine = new AnimaleseEngine(config);

      try {
        const speaker = engine.synthesize(text, false);

        log(`[Client] 스프라이트 파일 로드 중...`);
        await engine.load(speaker);
        log(`[Client] 스프라이트 로드 완료`);

        const typedTextEl = document.getElementById('typedTextContainer');
        typedTextEl.textContent = '';

        let totalSampleCount = 0;

        // Streaming (synthesis) loop
        for await (const result of speaker.speak()) {
          const chunk = result.buffer;
          totalSampleCount += chunk.length;

          if (result.char) {
            typedTextEl.textContent += result.char;
          }

          // 청크 단위로 즉시 재생 대기
          console.log(`[DEBUG] phoneme=${result.phoneme} bufLen=${chunk.length} pitch=${result.pitch.toFixed(3)} speed=${speed}`)
          await player.play(chunk);
        }

        log(`[Client] 재생 완료! 총 오디오 샘플 수: ${totalSampleCount}`);
      } catch (err) {
        log(`[Error] 생성 실패: ${err.message}`);
        console.error(err);
      } finally {
        playBtn.disabled = false;
      }
    });
  </script>
</head>

<body>
  <div class="layout-wrapper">
    <div class="container main-card" style="max-width: 600px;">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
        <h1 data-i18n="title" style="margin-bottom: 0;">🗣️ Animalese TTS</h1>
        <a href="https://github.com/izure1/animalese-tts" target="_blank"
          style="color: #88c0d0; text-decoration: none; font-weight: bold; padding: 5px 10px; border: 1px solid #88c0d0; border-radius: 4px; display: flex; align-items: center; gap: 5px; background: transparent; transition: 0.2s;"
          onmouseover="this.style.background='#88c0d0'; this.style.color='#222'"
          onmouseout="this.style.background='transparent'; this.style.color='#88c0d0'">
          <svg height="16" width="16" fill="currentColor" viewBox="0 0 16 16">
            <path
              d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z">
            </path>
          </svg>
          GitHub
        </a>
      </div>

      <label data-i18n="textLabel">텍스트 문장</label>
      <textarea id="text"
        rows="4">꺄아~! 완전 대박! 나 방금 새로운 댄스 스텝을 연습 중이었어! 나중에 내가 우주 대스타가 되면 지금 이 사인, 엄청 귀해질걸? 미리미리 받아두는 게 좋을 거야, 반짝!</textarea>

      <button id="playBtn" data-i18n="playBtnLabel" style="margin-top: 2rem;">▶️ 브라우저에서 직접 합성 및 재생</button>
      <div id="typedTextContainer"
        style="font-size: 1rem; font-weight: bold; color: #ebcb8b; margin-top: 1rem; min-height: 3rem; word-break: break-all;">
      </div>
      <div id="log" data-i18n="logInfo">안내: 버튼을 누르면 클라이언트 단에서 합성을 진행하고 재생합니다.</div>
    </div>

    <!-- 추가 설정 카드 -->
    <div class="container settings-card" style="max-width: 400px; padding: 1.5rem;">
      <div data-i18n="settingsSummary"
        style="font-weight: bold; font-size: 1.2rem; margin-bottom: 20px; border-bottom: 1px solid #4c566a; padding-bottom: 10px;">
        ⚙️ 추가 설정</div>
      <div style="display: flex; flex-direction: column; gap: 8px;">
        <label data-i18n="langLabel">언어</label>
        <select id="lang">
          <option value="ko">한국어 (Korean)</option>
          <option value="en">영어 (English)</option>
          <option value="ja">일본어 (Japanese)</option>
        </select>

        <label data-i18n="pitchLabel">Pitch 배율 (기본 1.5배)</label>
        <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 1rem;">
          <input type="range" id="pitch" value="1.5" step="0.1" min="0.5" max="3.0"
            oninput="this.nextElementSibling.innerText = this.value" style="margin-bottom: 0;" />
          <span style="min-width: 40px; text-align: right;">1.5</span>
        </div>

        <label data-i18n="speedLabel">Speed 배율 (기본 4.0배)</label>
        <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 1rem;">
          <input type="range" id="speed" value="4.0" step="0.1" min="0.5" max="5.0"
            oninput="this.nextElementSibling.innerText = this.value" style="margin-bottom: 0;" />
          <span style="min-width: 40px; text-align: right;">4.0</span>
        </div>

        <label data-i18n="randomnessLabel">Randomness (피치 변동폭, 기본 0.1)</label>
        <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 1rem;">
          <input type="range" id="randomness" value="0.1" step="0.1" min="0" max="1.0"
            oninput="this.nextElementSibling.innerText = this.value" style="margin-bottom: 0;" />
          <span style="min-width: 40px; text-align: right;">0.1</span>
        </div>

        <label data-i18n="melodyRateLabel">Melody Rate (음률 속도, 기본 0.05)</label>
        <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 1rem;">
          <input type="range" id="melodyRate" value="0.05" step="0.01" min="0" max="1.0"
            oninput="this.nextElementSibling.innerText = this.value" style="margin-bottom: 0;" />
          <span style="min-width: 40px; text-align: right;">0.05</span>
        </div>

        <label data-i18n="melodyAmplitudeLabel">Melody Amplitude (음률 진폭, 기본 0.1)</label>
        <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 1rem;">
          <input type="range" id="melodyAmplitude" value="0.1" step="0.01" min="0" max="1.0"
            oninput="this.nextElementSibling.innerText = this.value" style="margin-bottom: 0;" />
          <span style="min-width: 40px; text-align: right;">0.1</span>
        </div>

        <label data-i18n="spaceDelayLabel">띄어쓰기 대기 시간 (초, 기본 0.03)</label>
        <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 1rem;">
          <input type="range" id="spaceDelay" value="0.03" step="0.01" min="0" max="5.0"
            oninput="this.nextElementSibling.innerText = this.value" style="margin-bottom: 0;" />
          <span style="min-width: 40px; text-align: right;">0.03</span>
        </div>

        <label data-i18n="punctuationDelayLabel">마침표/특수기호 대기 시간 (초, 기본 0.3)</label>
        <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 1rem;">
          <input type="range" id="punctuationDelay" value="0.3" step="0.1" min="0" max="5.0"
            oninput="this.nextElementSibling.innerText = this.value" style="margin-bottom: 0;" />
          <span style="min-width: 40px; text-align: right;">0.3</span>
        </div>

        <label data-i18n="maxRetriesLabel">없는 음소 재시도 제한 횟수 (기본 3번)</label>
        <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 1rem;">
          <input type="range" id="maxRetries" value="3" step="1" min="0" max="100"
            oninput="this.nextElementSibling.innerText = this.value" style="margin-bottom: 0;" />
          <span style="min-width: 40px; text-align: right;">3</span>
        </div>

        <label data-i18n="punctuationsLabel">대기할 특수기호 목록 (문자열 나열, 기본: .,!?'"~。、！？)</label>
        <input type="text" id="punctuations" value=".,!?'&quot;()~。、！？" />

        <label data-i18n="volumeLabel">볼륨 (기본 1.0)</label>
        <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 1rem;">
          <input type="range" id="volume" value="1.0" step="0.1" min="0.0" max="2.0"
            oninput="this.nextElementSibling.innerText = this.value" style="margin-bottom: 0;" />
          <span style="min-width: 40px; text-align: right;">1.0</span>
        </div>
      </div>
    </div>
  </div>
</body>

</html>
